name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # =============================================================================
  # LINT & TYPE CHECK
  # =============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8 black mypy

      - name: Run flake8
        run: |
          flake8 services/api --max-line-length=120 --ignore=E501,W503

      - name: Run black
        run: |
          black --check services/api

      - name: Run mypy
        run: |
          mypy services/api

  # =============================================================================
  # FRONTEND LINT
  # =============================================================================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd services/frontend
          npm ci

      - name: Run ESLint
        run: |
          cd services/frontend
          npm run lint

      - name: Run TypeScript check
        run: |
          cd services/frontend
          npm run typecheck

  # =============================================================================
  # TEST
  # =============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
        run: |
          pytest tests/ --cov=services/api --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests

  # =============================================================================
  # BUILD DOCKER IMAGES
  # =============================================================================
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, frontend-lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/api
          push: false
          tags: netdiscoverit/api:${{ github.sha }}
          load: true

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/frontend
          push: false
          tags: netdiscoverit/frontend:${{ github.sha }}
          load: true

      - name: Build Agent image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/agent
          push: false
          tags: netdiscoverit/agent:${{ github.sha }}
          load: true
