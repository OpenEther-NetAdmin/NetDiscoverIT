services:
  # =============================================================================
  # POSTGRES DATABASE
  # =============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: netdiscoverit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netdiscoverit}
      POSTGRES_USER: ${POSTGRES_USER:-netdiscoverit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netdiscoverit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # REDIS
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: netdiscoverit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # VAULT (for secrets)
  # =============================================================================
  vault:
    image: hashicorp/vault:1.17
    container_name: netdiscoverit-vault
    restart: unless-stopped
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-changeme}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/file
    cap_add:
      - IPC_LOCK

  # =============================================================================
  # OLLAMA (local LLM)
  # =============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: netdiscoverit-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434

  # =============================================================================
  # API SERVICE (FastAPI)
  # =============================================================================
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: netdiscoverit-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-netdiscoverit}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-netdiscoverit}
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-changeme}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-super-secret-key-min-32-chars}
      - OLLAMA_BASE_URL=http://ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-changeme-internal-api-key}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-netdiscoverit}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_started
      ollama:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./services/api:/app
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
      - ./services/agent/agent:/app/agent
      - ./services/common:/app/services/common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # =============================================================================
  # FRONTEND (React)
  # =============================================================================
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: netdiscoverit-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=${APP_API_URL:-http://localhost:8000}
      - REACT_APP_WS_URL=ws://localhost:8000
    depends_on:
      - api

  # =============================================================================
  # NEO4J (Graph Database for Topology Visualization)
  # =============================================================================
  neo4j:
    image: neo4j:5-community
    container_name: netdiscoverit-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =============================================================================
  # LOCAL AGENT (for development)
  # =============================================================================
  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    container_name: netdiscoverit-agent
    restart: unless-stopped
    environment:
      - API_KEY=${AGENT_API_KEY:-changeme}
      - API_ENDPOINT=${AGENT_API_ENDPOINT:-http://api:8000}
      - ORG_ID=${AGENT_ORG_ID:-default}
      - DISCOVERY_METHODS=${AGENT_DISCOVERY_METHODS:-ssh,snmp,nmap,cdp,lldp,netflow}
      - SSH_TIMEOUT=${AGENT_SSH_TIMEOUT:-30}
      - SNMP_TIMEOUT=${AGENT_SNMP_TIMEOUT:-5}
      - NMAP_TIMEOUT=${AGENT_NMAP_TIMEOUT:-60}
      - SCAN_INTERVAL=${AGENT_SCAN_INTERVAL:-24h}
      - LOG_LEVEL=${AGENT_LOG_LEVEL:-info}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:7b}
    volumes:
      - agent_data:/app/data
      - ./configs/agent.yaml:/app/config/agent.yaml:ro
      - ./services/common:/app/services/common

  # =============================================================================
  # MINIO (S3-compatible object storage — exports, compliance reports)
  # Console: http://localhost:9001  (login: MINIO_ACCESS_KEY / MINIO_SECRET_KEY)
  # =============================================================================
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: netdiscoverit-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # MINIO INIT (one-shot: creates bucket on first start, then exits)
  # =============================================================================
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET:-netdiscoverit} &&
      echo 'Bucket ready.' &&
      exit 0
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  vault_data:
  ollama_data:
  neo4j_data:
  neo4j_logs:
  agent_data:
  minio_data:

networks:
  default:
    name: netdiscoverit-network
