system {
    host-name core-router-01;
    name-server {
        8.8.8.8;
    }
}
interfaces {
    ge-0/0/0 {
        description "Uplink to Core";
        unit 0 {
            family inet {
                address 10.1.1.1/30;
            }
        }
    }
    ge-0/0/1 {
        description "Downlink to Access";
        unit 0 {
            family inet {
                address 192.168.1.1/24;
            }
        }
    }
}
protocols {
    ospf {
        area 0.0.0.0 {
            interface ge-0/0/0.0;
            interface ge-0/0/1.0;
        }
    }
}
