substitutions:
  _REGION: us-central1
  _API_IMAGE: netdiscoverit-api
  _FRONTEND_IMAGE: netdiscoverit-frontend
  _AGENT_IMAGE: netdiscoverit-agent
  _DB_INSTANCE: netdiscoverit-db
  _REDIS_INSTANCE: netdiscoverit-redis

steps:
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_API_IMAGE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_API_IMAGE}:latest
      - -f
      - deploy/gcp/api.Dockerfile
      - .
    waitFor: ['-']

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_FRONTEND_IMAGE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_FRONTEND_IMAGE}:latest
      - -f
      - deploy/gcp/frontend.Dockerfile
      - .
    waitFor: ['-']

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_API_IMAGE}
    waitFor:
      - build-api

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_FRONTEND_IMAGE}
    waitFor:
      - build-frontend

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - netdiscoverit-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_API_IMAGE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --cpu=2
      - --memory=2Gi
      - --min-instances=1
      - --max-instances=10
      - --set-cloudsql-instances=$PROJECT_ID:${_REGION}:${_DB_INSTANCE}
      - --set-secrets=POSTGRES_PASSWORD=netdiscoverit-postgres-password:latest,JWT_SECRET_KEY=netdiscoverit-jwt-secret:latest,INTERNAL_API_KEY=netdiscoverit-internal-api-key:latest,CREDENTIAL_ENCRYPTION_KEY=netdiscoverit-credential-encryption-key:latest
      - --set-env-vars=POSTGRES_HOST=/cloudsql/$PROJECT_ID:${_REGION}:${_DB_INSTANCE},POSTGRES_PORT=5432,POSTGRES_DB=netdiscoverit,POSTGRES_USER=netdiscoverit
    waitFor:
      - push-api

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - netdiscoverit-frontend
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_FRONTEND_IMAGE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --cpu=1
      - --memory=512Mi
      - --min-instances=0
      - --max-instances=5
    waitFor:
      - push-frontend

  - id: run-migrations
    name: ${_REGION}-docker.pkg.dev/$PROJECT_ID/netdiscoverit/${_API_IMAGE}:$SHORT_SHA
    entrypoint: python
    args:
      - -m
      - alembic
      - upgrade
      - head
    secretEnv:
      - POSTGRES_PASSWORD
      - JWT_SECRET_KEY
    env:
      - POSTGRES_HOST=/cloudsql/$PROJECT_ID:${_REGION}:${_DB_INSTANCE}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=netdiscoverit
      - POSTGRES_USER=netdiscoverit
    waitFor:
      - deploy-api

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/netdiscoverit-postgres-password/versions/latest
      env: POSTGRES_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/netdiscoverit-jwt-secret/versions/latest
      env: JWT_SECRET_KEY

timeout: 1200s
